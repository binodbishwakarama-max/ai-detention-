name: PR Validation

on:
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest pytest-cov testcontainers
        pip install -e .
        
    - name: Lint with Ruff
      run: |
        ruff check .
        ruff format --check .
        
    - name: Run PyTest
      env:
        SECRET_KEY: test_secret_key_string
      run: |
        pytest tests/ -n 4 --cov=src --cov-report=xml --cov-fail-under=95
        
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v4.0.1
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: your-org/eval-engine
