# ============================================================
# Kubernetes Deployment — API Server
# ============================================================
# Production configuration with:
# - 3 replicas for high availability
# - Resource limits to prevent noisy neighbors
# - Liveness/readiness probes for automated recovery
# - Rolling updates with zero downtime
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: eval-engine-api
  namespace: eval-engine
  labels:
    app: eval-engine
    component: api
spec:
  replicas: 3
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: eval-engine
      component: api
  template:
    metadata:
      labels:
        app: eval-engine
        component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: eval-engine
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: eval-engine:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - secretRef:
                name: eval-engine-secrets
            - configMapRef:
                name: eval-engine-config
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
      terminationGracePeriodSeconds: 30

---
# ── Service ────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: eval-engine-api
  namespace: eval-engine
  labels:
    app: eval-engine
    component: api
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: eval-engine
    component: api

---
# ── HorizontalPodAutoscaler ─────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: eval-engine-api
  namespace: eval-engine
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: eval-engine-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# ── Celery Worker Deployment ─────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eval-engine-worker
  namespace: eval-engine
  labels:
    app: eval-engine
    component: worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: eval-engine
      component: worker
  template:
    metadata:
      labels:
        app: eval-engine
        component: worker
    spec:
      serviceAccountName: eval-engine
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: worker
          image: eval-engine:latest
          command:
            - celery
            - -A
            - src.workers.celery_app
            - worker
            - --loglevel=info
            - --concurrency=4
            - --queues=evaluations,exports,maintenance
            - --hostname=worker@%h
          envFrom:
            - secretRef:
                name: eval-engine-secrets
            - configMapRef:
                name: eval-engine-config
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          livenessProbe:
            exec:
              command:
                - celery
                - -A
                - src.workers.celery_app
                - inspect
                - ping
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 10
      terminationGracePeriodSeconds: 300  # allow tasks to complete

---
# ── ConfigMap ──────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: eval-engine-config
  namespace: eval-engine
data:
  APP_NAME: "AI Evaluation Engine"
  APP_ENV: "production"
  APP_VERSION: "1.0.0"
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
  CORS_ORIGINS: "https://app.evalengine.com"
  S3_BUCKET_NAME: "eval-engine-production"
  S3_REGION: "us-east-1"

---
# ── Namespace ──────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: eval-engine
  labels:
    app: eval-engine
